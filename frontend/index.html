<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Zipper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>File Zipper</h1>
    <p class="subtitle">Compress and decompress files using adaptive encoding</p>

    <div class="box">
        <input type="file" id="fileInput">
        <label for="fileInput" class="file-label" id="fileLabel">Choose a file</label>
        <p id="fileName" class="file-name"></p>

        <div class="btn-row">
            <button id="compressBtn" onclick="compressFile()">Compress</button>
            <button id="decompressBtn" onclick="decompressFile()">Decompress</button>
        </div>
    </div>

    <p id="error" class="msg error hidden"></p>
    <p id="status" class="msg success hidden"></p>

    <div id="result" class="hidden">
        <a id="downloadBtn" class="download-btn" download>Download File</a>
    </div>

    <div id="stats" class="hidden">
        <table>
            <tr><td>Method</td><td id="method">—</td></tr>
            <tr><td>Entropy</td><td id="entropy">—</td></tr>
            <tr><td>Original Size</td><td id="origSize">—</td></tr>
            <tr><td>Compressed Size</td><td id="compSize">—</td></tr>
            <tr><td>Reduction</td><td id="reduction">—</td></tr>
            <tr><td>Time</td><td id="time">—</td></tr>
        </table>
        <p id="noneNote" class="hidden note">Note: File could not be compressed further (already compressed or random data).</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
